<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing | Sara's Compass</title>
<link rel="stylesheet" href="style.css">
<style>
  body { --page-accent: var(--accent-blog); --page-accent-soft: var(--accent-blog-soft); --page-accent-dark: var(--accent-blog-dark); }

  .article-list { display: flex; flex-direction: column; gap: 12px; }
  .article-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    background: var(--base-bg-card);
    border: 1px solid var(--base-border);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    text-decoration: none;
    color: var(--ink);
    transition: transform .15s, box-shadow .15s;
  }
  .article-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  .article-card.is-dummy { opacity: 0.55; cursor: default; }
  .article-card.is-dummy:hover { transform: none; box-shadow: none; }

  .ac-left { flex: 1; min-width: 0; }
  .ac-date { font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; }
  .ac-title { font-size: 14.5px; font-weight: 800; margin-bottom: 4px; }
  .ac-desc { font-size: 12px; color: var(--ink-soft); }
  .ac-arrow { font-size: 18px; color: var(--page-accent); flex-shrink: 0; }

  .coming-note {
    text-align: center;
    padding: 20px;
    font-size: 12.5px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <a href="index.html" class="logo">Sara's Compass</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="learning.html">Learning</a>
      <a href="writing.html" class="active">Writing</a>
      <a href="projects.html">Projects</a>
      <a href="growth.html">Growth</a>
    </nav>
  </header>

  <div class="page-hero">
    <div class="eyebrow">WRITING</div>
    <h1>Writing</h1>
    <p>noteで発信した記事をまとめています。執筆準備中です。</p>
  </div>

  <div class="card">
    <h2>記事一覧</h2>
    <div class="article-list">

      <div class="article-card is-dummy">
        <div class="ac-left">
          <div class="ac-date">準備中</div>
          <div class="ac-title">税理士試験に挑戦する理由</div>
          <div class="ac-desc">なぜ今、税理士を目指しているのか。これまでの歩みを振り返って。</div>
        </div>
        <div class="ac-arrow">→</div>
      </div>

      <div class="article-card is-dummy">
        <div class="ac-left">
          <div class="ac-date">準備中</div>
          <div class="ac-title">通信制大学で学ぶということ</div>
          <div class="ac-desc">仕事と学業を両立するための工夫と、続けるコツ。</div>
        </div>
        <div class="ac-arrow">→</div>
      </div>

      <div class="article-card is-dummy">
        <div class="ac-left">
          <div class="ac-date">準備中</div>
          <div class="ac-title">誠実さを、最大の競争力に</div>
          <div class="ac-desc">将来の独立に向けて考えている、経営への想い。</div>
        </div>
        <div class="ac-arrow">→</div>
      </div>

    </div>
    <p class="coming-note">記事が公開されたら、ここにnoteのリンクが追加されます。</p>
  </div>

  <footer class="site-footer">
    Sara's Compass
  </footer>

</div>
<script src="secret.js"></script>
</body>
</html>
