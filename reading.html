<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading | Sara's Compass</title>
<link rel="stylesheet" href="style.css">
<style>
  body { --page-accent: var(--accent-reading); --page-accent-soft: var(--accent-reading-soft); --page-accent-dark: var(--accent-reading-dark); }

  .book-list { display: flex; flex-direction: column; gap: 12px; }
  .book-card {
    background: var(--base-bg-card);
    border: 1px solid var(--base-border);
    border-radius: var(--radius-md);
    padding: 16px 18px;
  }
  .book-card .b-title { font-size: 14.5px; font-weight: 800; margin-bottom: 3px; }
  .book-card .b-author { font-size: 12px; color: var(--ink-soft); margin-bottom: 8px; }
  .book-card .b-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .book-card .b-date {
    font-size: 11px; color: var(--ink-soft); background: var(--base-bg);
    border-radius: 999px; padding: 3px 10px;
  }
  .book-card .b-memo { font-size: 12.5px; color: var(--ink); margin-top: 8px; line-height: 1.6; }
  .book-card .b-note-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700; color: var(--accent-blog-dark);
    background: var(--accent-blog-soft);
    border-radius: 999px; padding: 4px 12px;
    text-decoration: none;
  }
  .book-card .b-note-pending {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; color: var(--ink-soft);
    border-radius: 999px; padding: 4px 12px;
    background: var(--base-bg);
  }
  #book-list .loading { font-size: 13px; color: var(--ink-soft); }
  .summary-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--page-accent-soft); color: var(--page-accent-dark);
    border-radius: 999px; padding: 6px 14px; font-size: 13px; font-weight: 700;
    margin-bottom: 14px;
  }

  .form-grid { display: flex; flex-direction: column; gap: 14px; }
  .field-block { background: var(--base-bg); border: 1px solid var(--base-border); border-radius: var(--radius-md); padding: 14px 16px; }
  .field-block label.title { display: block; font-size: 13.5px; font-weight: 700; margin-bottom: 8px; }

  input[type="text"], input[type="date"], input[type="url"] {
    width: 100%;
    border: 1px solid var(--base-border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    background: var(--base-bg-card);
    color: var(--ink);
  }

  .submit-btn {
    width: 100%;
    background: var(--page-accent);
    color: #fffdf8;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }
  .submit-btn:disabled { opacity: 0.6; cursor: default; }

  #form-status { font-size: 12.5px; margin-top: 8px; min-height: 16px; }
  #form-status.ok { color: var(--accent-reading-dark); }
  #form-status.err { color: #a32d2d; }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <a href="index.html" class="logo"><img src="images/logo-icon.png" alt="">Sara's Compass</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="learning.html">Learning</a>
      <a href="reading.html" class="active">Reading</a>
      <a href="writing.html">Writing</a>
      <a href="projects.html">Projects</a>
      <a href="growth.html">Growth</a>
    </nav>
  </header>

  <div class="page-hero">
    <div class="eyebrow">READING</div>
    <h1>Reading</h1>
    <p>読んだ本の記録です。感想はnoteで書いていく予定なので、書けたらここからもリンクします。</p>
  </div>

  <div class="card">
    <h2>読了本を記録する</h2>
    <form id="book-form" class="form-grid">
      <div class="field-block">
        <label class="title">書名</label>
        <input type="text" id="book-title" placeholder="例：嫌われる勇気" required>
      </div>
      <div class="field-block">
        <label class="title">著者</label>
        <input type="text" id="book-author" placeholder="例：岸見一郎、古賀史健">
      </div>
      <div class="field-block">
        <label class="title">読了日</label>
        <input type="date" id="book-date">
      </div>
      <div class="field-block">
        <label class="title">noteの感想記事URL（任意）</label>
        <input type="url" id="book-note-url" placeholder="https://note.com/...">
      </div>
      <div class="field-block">
        <label class="title">ひとことメモ（任意）</label>
        <input type="text" id="book-memo" placeholder="感想を書く前の、簡単な一言">
      </div>
      <button type="submit" class="submit-btn" id="book-submit-btn">記録する</button>
      <div id="form-status"></div>
    </form>
  </div>

  <div class="card">
    <h2>読了本一覧</h2>
    <div class="summary-pill" id="book-count">読み込み中…</div>
    <div class="book-list" id="book-list"><p class="loading">読み込み中…</p></div>
  </div>

  <footer class="site-footer">
    Sara's Compass
  </footer>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbw7wwZ0zwtAm_WSEmJzI6shAWQ2LgsBXsgZRbLMW2VP_e-YfiKo59uYNXnc6YZJSggtAQ/exec';

  function dateLabel(d) {
    if (!d) return '';
    const md = new Date(String(d).slice(0, 10) + 'T00:00:00');
    if (isNaN(md.getTime())) return String(d);
    return md.getFullYear() + '/' + (md.getMonth() + 1) + '/' + md.getDate();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function todayStr() {
    const d = new Date();
    const tz = d.getTimezoneOffset() * 60000;
    return new Date(d - tz).toISOString().slice(0, 10);
  }
  document.getElementById('book-date').value = todayStr();

  document.getElementById('book-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = document.getElementById('book-submit-btn');
    const statusEl = document.getElementById('form-status');
    btn.disabled = true;
    statusEl.textContent = '送信中…';
    statusEl.className = '';

    const params = new URLSearchParams({
      title: document.getElementById('book-title').value || '',
      author: document.getElementById('book-author').value || '',
      finished_date: document.getElementById('book-date').value || '',
      note_url: document.getElementById('book-note-url').value || '',
      memo: document.getElementById('book-memo').value || ''
    });

    try {
      await fetch(GAS_URL, { method: 'POST', body: params });
      statusEl.textContent = '記録しました';
      statusEl.className = 'ok';
      document.getElementById('book-form').reset();
      document.getElementById('book-date').value = todayStr();
      loadBooks();
    } catch (err) {
      statusEl.textContent = '記録に失敗しました。もう一度試してね';
      statusEl.className = 'err';
    } finally {
      btn.disabled = false;
    }
  });

  async function loadBooks() {
    const listEl = document.getElementById('book-list');
    const countEl = document.getElementById('book-count');
    try {
      const res = await fetch(GAS_URL);
      const rows = await res.json();
      if (!rows || rows.length === 0) {
        listEl.innerHTML = '<p class="loading">まだ記録がありません</p>';
        countEl.textContent = '📚 読了 0冊';
        return;
      }
      const sorted = rows.slice().reverse();
      countEl.textContent = '📚 読了 ' + rows.length + '冊';
      listEl.innerHTML = sorted.map(b => {
        const noteHtml = b.note_url
          ? '<a href="' + escapeHtml(String(b.note_url)) + '" class="b-note-link" target="_blank" rel="noopener">✍️ noteで感想を読む</a>'
          : '<span class="b-note-pending">感想はnoteで執筆予定</span>';
        return '<div class="book-card">' +
          '<div class="b-title">' + escapeHtml(String(b.title || '')) + '</div>' +
          '<div class="b-author">' + escapeHtml(String(b.author || '')) + '</div>' +
          '<div class="b-meta">' +
            (b.finished_date ? '<span class="b-date">読了：' + dateLabel(b.finished_date) + '</span>' : '') +
            noteHtml +
          '</div>' +
          (b.memo ? '<div class="b-memo">' + escapeHtml(String(b.memo)) + '</div>' : '') +
          '</div>';
      }).join('');
    } catch (err) {
      listEl.innerHTML = '<p class="loading">読み込みに失敗しました</p>';
      countEl.textContent = '';
    }
  }

  loadBooks();
</script>
<script src="secret.js"></script>
</body>
</html>
