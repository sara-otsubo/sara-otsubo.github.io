<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara's Compass</title>
<link rel="stylesheet" href="style.css">
<style>
  body { --page-accent: var(--accent-top); --page-accent-soft: var(--accent-top-soft); --page-accent-dark: var(--accent-top-dark); }

  .hero-banner {
    background: linear-gradient(135deg, var(--accent-top-soft), var(--base-bg-card));
    border-radius: var(--radius-lg);
    padding: 40px 28px;
    margin-bottom: 32px;
    text-align: center;
    border: 1px solid var(--base-border);
  }
  .hero-banner .mark {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent-top);
    margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .hero-banner h1 {
    margin: 0 0 8px;
    font-size: 26px;
    font-weight: 800;
  }
  .hero-banner p {
    margin: 0;
    font-size: 14px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <a href="index.html" class="logo">Sara's Compass</a>
    <nav>
      <a href="index.html" class="active">トップ</a>
      <a href="study.html">勉強記録</a>
      <a href="health.html">健康記録</a>
      <a href="blog.html">ブログ</a>
      <a href="about.html">その他</a>
    </nav>
  </header>

  <div class="hero-banner">
    <div class="mark">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="5" fill="white" opacity="0.95"/>
        <g stroke="white" stroke-width="1.5" opacity="0.95">
          <line x1="12" y1="2" x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
        </g>
      </svg>
    </div>
    <h1>思いやりと誠実さで、共に歩む。</h1>
    <p>勉強・健康・発信・成長の記録を、ここにひとつにまとめています。</p>
  </div>

  <div class="nav-grid">
    <a href="study.html" class="nav-card" style="--card-accent: var(--accent-study);">
      <div class="nc-title">📘 勉強記録</div>
      <div class="nc-desc">税理士試験・大学の単位取得、日々の学習ログと進捗率</div>
    </a>
    <a href="health.html" class="nav-card" style="--card-accent: var(--accent-health);">
      <div class="nc-title">🌿 健康記録</div>
      <div class="nc-desc">食事・運動・気分・生理周期などの日々の記録</div>
    </a>
    <a href="blog.html" class="nav-card" style="--card-accent: var(--accent-blog);">
      <div class="nc-title">✒️ ブログ</div>
      <div class="nc-desc">noteで公開した記事のリンク集。えんゆ税理士事務所の足掛かり</div>
    </a>
    <a href="about.html" class="nav-card" style="--card-accent: var(--accent-other);">
      <div class="nc-title">🧭 その他</div>
      <div class="nc-desc">Project Compassのメンバー紹介、その他の情報</div>
    </a>
  </div>

  <footer class="site-footer">
    Sara's Compass — Project Compass
  </footer>

</div>
</body>
</html>
