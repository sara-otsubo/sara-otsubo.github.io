<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支出推移（非公開） | Sara's Compass</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="style.css">
<style>
  body { --page-accent: var(--accent-expense); --page-accent-soft: var(--accent-expense-soft); --page-accent-dark: var(--accent-expense-dark); }

  .private-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-other-soft);
    color: var(--accent-other-dark);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 11.5px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .chart-wrap { width: 100%; overflow-x: auto; }
  svg.chart { width: 100%; height: auto; display: block; }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 4px; }
  @media (max-width: 600px) { .stat-grid { grid-template-columns: 1fr; } }
  .stat-card { background: var(--base-bg); border: 1px solid var(--base-border); border-radius: var(--radius-md); padding: 14px; text-align: center; }
  .stat-card .st-num { font-size: 18px; font-weight: 800; color: var(--page-accent-dark); }
  .stat-card .st-label { font-size: 11px; color: var(--ink-soft); margin-top: 4px; }

  .period-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .period-table th, .period-table td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--base-border); }
  .period-table th { color: var(--ink-soft); font-weight: 700; font-size: 11.5px; }
  .period-table .memo-cell { color: var(--ink-soft); font-size: 11.5px; }

  #content-area .loading { font-size: 13px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <a href="index.html" class="logo"><img src="images/logo-icon.png" alt="">Sara's Compass</a>
  </header>

  <div class="page-hero">
    <span class="private-badge">🔒 非公開ページ</span>
    <div class="eyebrow">EXPENSE TREND</div>
    <h1>支出推移</h1>
    <p>パキラの報告書をもとに、半月ごとの食費・推し活・貯蓄の動きを記録しています。</p>
  </div>

  <div id="content-area">
    <p class="loading">読み込み中…</p>
  </div>

  <footer class="site-footer">
    Sara's Compass
  </footer>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycby_ukjAi9Ry3qZGqyVW9j9502VNxsl-n3CQPvMIDuqLENaIJ2RqkaQIXm483bTorrKk/exec';

  function dateLabel(d) {
    if (!d) return '';
    const md = new Date(String(d).slice(0, 10) + 'T00:00:00');
    if (isNaN(md.getTime())) return String(d);
    return (md.getMonth() + 1) + '/' + md.getDate();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function buildLineChart(points, color, label) {
    if (points.length < 2) return '<p class="loading">データが2件以上集まるとグラフが表示されます</p>';
    const W = 600, H = 160, padL = 50, padR = 14, padT = 16, padB = 26;
    const values = points.map(p => p.value);
    let min = Math.min(...values, 0);
    let max = Math.max(...values);
    if (min === max) { min -= 1; max += 1; }
    const range = max - min;
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;

    const xStep = points.length > 1 ? innerW / (points.length - 1) : 0;
    const coords = points.map((p, i) => {
      const x = padL + i * xStep;
      const y = padT + innerH - ((p.value - min) / range) * innerH;
      return [x, y];
    });

    const pathD = coords.map((c, i) => (i === 0 ? 'M' : 'L') + c[0].toFixed(1) + ',' + c[1].toFixed(1)).join(' ');
    const areaD = pathD + ` L${coords[coords.length-1][0].toFixed(1)},${padT+innerH} L${coords[0][0].toFixed(1)},${padT+innerH} Z`;

    const gridLines = [];
    for (let i = 0; i <= 2; i++) {
      const y = padT + (innerH / 2) * i;
      const val = max - (range / 2) * i;
      gridLines.push(`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#ddd5c2" stroke-width="1" stroke-dasharray="2,3"/>`);
      gridLines.push(`<text x="${padL-8}" y="${y+3}" font-size="10" fill="#8a8270" text-anchor="end">${Math.round(val).toLocaleString()}</text>`);
    }

    const xLabels = points.map((p, i) =>
      `<text x="${coords[i][0]}" y="${H-8}" font-size="10" fill="#8a8270" text-anchor="middle">${p.label}</text>`
    ).join('');

    const dots = coords.map((c, i) =>
      `<circle cx="${c[0]}" cy="${c[1]}" r="3.5" fill="${color}" stroke="#fffdf8" stroke-width="1.5"><title>${points[i].label}: ${points[i].value.toLocaleString()}円</title></circle>`
    ).join('');

    return `
      <svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        ${gridLines.join('')}
        <path d="${areaD}" fill="${color}" opacity="0.12"/>
        <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2.2"/>
        ${dots}
        ${xLabels}
      </svg>
    `;
  }

  async function loadExpenseData() {
    const area = document.getElementById('content-area');
    try {
      const res = await fetch(GAS_URL);
      const rows = await res.json();
      if (!rows || rows.length === 0) {
        area.innerHTML = '<div class="card"><p class="loading">まだデータがありません</p></div>';
        return;
      }

      const periodLabels = rows.map(r => dateLabel(r.period_start) + '〜' + dateLabel(r.period_end));
      const foodPoints = rows.map((r, i) => ({ value: Number(r.food_cost) || 0, label: periodLabels[i] }));
      const oshiPoints = rows.map((r, i) => ({ value: Number(r.oshi_cost) || 0, label: periodLabels[i] }));
      const savingsPoints = rows.map((r, i) => ({ value: Number(r.savings_balance) || 0, label: periodLabels[i] }));

      const latest = rows[rows.length - 1];

      let html = '';

      html += '<div class="stat-grid">';
      html += `<div class="stat-card"><div class="st-num">¥${(Number(latest.food_cost)||0).toLocaleString()}</div><div class="st-label">直近の食費</div></div>`;
      html += `<div class="stat-card"><div class="st-num">¥${(Number(latest.oshi_cost)||0).toLocaleString()}</div><div class="st-label">直近の推し活</div></div>`;
      html += `<div class="stat-card"><div class="st-num">¥${(Number(latest.savings_balance)||0).toLocaleString()}</div><div class="st-label">貯蓄サブ残高</div></div>`;
      html += '</div>';

      html += '<div class="card"><h2>食費の推移</h2><div class="chart-wrap">' + buildLineChart(foodPoints, 'var(--accent-expense)') + '</div></div>';
      html += '<div class="card"><h2>推し活の推移</h2><div class="chart-wrap">' + buildLineChart(oshiPoints, 'var(--accent-health)') + '</div></div>';
      html += '<div class="card"><h2>貯蓄サブ残高の推移</h2><div class="chart-wrap">' + buildLineChart(savingsPoints, 'var(--accent-reading)') + '</div></div>';

      html += '<div class="card"><h2>期間ごとの記録</h2><table class="period-table"><thead><tr>' +
        '<th>期間</th><th>食費</th><th>推し活</th><th>貯蓄サブ残高</th><th>メモ</th></tr></thead><tbody>';
      rows.slice().reverse().forEach(r => {
        html += '<tr>' +
          '<td>' + dateLabel(r.period_start) + '〜' + dateLabel(r.period_end) + '</td>' +
          '<td>¥' + (Number(r.food_cost)||0).toLocaleString() + '</td>' +
          '<td>¥' + (Number(r.oshi_cost)||0).toLocaleString() + '</td>' +
          '<td>¥' + (Number(r.savings_balance)||0).toLocaleString() + '</td>' +
          '<td class="memo-cell">' + escapeHtml(String(r.memo || '')) + '</td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';

      area.innerHTML = html;
    } catch (err) {
      area.innerHTML = '<div class="card"><p class="loading">読み込みに失敗しました</p></div>';
    }
  }

  loadExpenseData();
</script>
</body>
</html>
