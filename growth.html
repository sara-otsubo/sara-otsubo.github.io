<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth | Sara's Compass</title>
<link rel="stylesheet" href="style.css">
<style>
  body { --page-accent: var(--accent-health); --page-accent-soft: var(--accent-health-soft); --page-accent-dark: var(--accent-health-dark); }

  .streak-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 600px) { .streak-grid { grid-template-columns: 1fr; } }

  .streak-card {
    background: var(--base-bg);
    border: 1px solid var(--base-border);
    border-radius: var(--radius-md);
    padding: 18px;
    text-align: center;
  }
  .streak-card .s-num { font-size: 28px; font-weight: 800; color: var(--page-accent-dark); }
  .streak-card .s-label { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }

  .placeholder-note {
    text-align: center;
    padding: 24px;
    font-size: 12.5px;
    color: var(--ink-soft);
    background: var(--base-bg);
    border: 1px dashed var(--base-border);
    border-radius: var(--radius-md);
  }

  .month-list { display: flex; flex-direction: column; gap: 10px; }
  .month-row {
    display: flex; justify-content: space-between; align-items: center;
    border: 1px solid var(--base-border); border-radius: 8px;
    padding: 10px 14px; font-size: 13px;
  }
  .month-row .m-name { font-weight: 700; }
  .month-row .m-status { font-size: 11.5px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <a href="index.html" class="logo"><img src="images/logo-icon.png" alt="">Sara's Compass</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="learning.html">Learning</a>
      <a href="reading.html">Reading</a>
      <a href="writing.html">Writing</a>
      <a href="projects.html">Projects</a>
      <a href="growth.html" class="active">Growth</a>
    </nav>
  </header>

  <div class="page-hero">
    <div class="eyebrow">GROWTH</div>
    <h1>Growth</h1>
    <p>月次レポート、継続日数、過去からの変化をまとめていく予定のページです。</p>
  </div>

  <div class="card">
    <h2>継続記録</h2>
    <div class="streak-grid">
      <div class="streak-card">
        <div class="s-num" id="streak-days">—</div>
        <div class="s-label">継続更新日数</div>
      </div>
      <div class="streak-card">
        <div class="s-num" id="total-days">—</div>
        <div class="s-label">のべ活動日数</div>
      </div>
    </div>
    <p style="font-size:11.5px; color:var(--ink-soft); margin-top:10px; margin-bottom:0;">
      健康記録・学習記録の入力、またはこのサイトの更新（GitHubへのコミット）のいずれかがあった日をカウントしています。
    </p>
  </div>

  <div class="card">
    <h2>月次レポート</h2>
    <div class="month-list">
      <div class="month-row">
        <span class="m-name">2026年6月</span>
        <span class="m-status">準備中</span>
      </div>
    </div>
    <div class="placeholder-note" style="margin-top:14px;">
      ここに月ごとの振り返り（学習時間・健康記録の傾向・できごと）を蓄積していく予定です。
    </div>
  </div>

  <footer class="site-footer">
    Sara's Compass
  </footer>

</div>

<script>
  const HEALTH_GAS_URL = 'https://script.google.com/macros/s/AKfycbxcG5koxkbuJ7c44aPmVAe-jpXJXW8dsl4aot_tIniA7-Nc7GJm3r-AOQHyXrndb4Mv/exec';
  const STUDY_GAS_URL = 'https://script.google.com/macros/s/AKfycbwaZx_bNjdmJnyV2wSdmSrdyR-SYGlVUEMKDazAEW4oGb7INTFfntMZIomzItU-MBJvTQ/exec';
  const GITHUB_API_URL = 'https://api.github.com/repos/sara-otsubo/sara-otsubo.github.io/commits?per_page=100';

  function toDateStr(d) {
    // タイムゾーンに関わらず "YYYY-MM-DD" の日付文字列に正規化
    const dt = new Date(d);
    const tz = dt.getTimezoneOffset() * 60000;
    return new Date(dt - tz).toISOString().slice(0, 10);
  }

  async function fetchHealthDates() {
    try {
      const res = await fetch(HEALTH_GAS_URL);
      const rows = await res.json();
      return rows.map(r => String(r.date).slice(0, 10)).filter(Boolean);
    } catch (e) { return []; }
  }

  async function fetchStudyDates() {
    try {
      const res = await fetch(STUDY_GAS_URL + '?type=log');
      const rows = await res.json();
      return rows.map(r => String(r.date).slice(0, 10)).filter(Boolean);
    } catch (e) { return []; }
  }

  async function fetchCommitDates() {
    try {
      const res = await fetch(GITHUB_API_URL);
      const commits = await res.json();
      if (!Array.isArray(commits)) return [];
      return commits.map(c => toDateStr(c.commit.author.date));
    } catch (e) { return []; }
  }

  function calcStreak(dateSet) {
    let streak = 0;
    let cursor = new Date();
    while (true) {
      const ds = toDateStr(cursor);
      if (dateSet.has(ds)) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else {
        break;
      }
    }
    return streak;
  }

  async function loadStreak() {
    const [healthDates, studyDates, commitDates] = await Promise.all([
      fetchHealthDates(), fetchStudyDates(), fetchCommitDates()
    ]);
    const allDates = new Set([...healthDates, ...studyDates, ...commitDates]);

    const streak = calcStreak(allDates);
    document.getElementById('streak-days').textContent = streak + '日';
    document.getElementById('total-days').textContent = allDates.size + '日';
  }

  loadStreak();
</script>
<script src="secret.js"></script>
</body>
</html>
