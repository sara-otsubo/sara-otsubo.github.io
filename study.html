<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勉強記録 | Sara's Compass</title>
<link rel="stylesheet" href="style.css">
<style>
  body { --page-accent: var(--accent-study); --page-accent-soft: var(--accent-study-soft); --page-accent-dark: var(--accent-study-dark); }

  .progress-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 4px; }
  @media (max-width: 700px) { .progress-grid { grid-template-columns: 1fr; } }

  .progress-card { background: var(--base-bg); border: 1px solid var(--base-border); border-radius: var(--radius-md); padding: 14px 16px; }
  .progress-card .pc-title { font-size: 13px; font-weight: 800; margin-bottom: 8px; }
  .progress-bar-track { width: 100%; height: 10px; background: var(--base-border); border-radius: 999px; overflow: hidden; margin-bottom: 6px; }
  .progress-bar-fill { height: 100%; background: var(--page-accent); border-radius: 999px; transition: width .3s; }
  .pc-percent { font-size: 18px; font-weight: 800; color: var(--page-accent-dark); }
  .pc-memo { font-size: 11.5px; color: var(--ink-soft); margin-top: 4px; min-height: 14px; }

  .progress-edit-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
  .progress-edit-row select { flex: 1; }
  .progress-edit-row input[type="number"] { width: 70px; }

  .form-grid { display: flex; flex-direction: column; gap: 14px; }
  .field-block { background: var(--base-bg); border: 1px solid var(--base-border); border-radius: var(--radius-md); padding: 14px 16px; }
  .field-block label.title { display: block; font-size: 13.5px; font-weight: 700; margin-bottom: 8px; }

  input[type="text"], input[type="number"], input[type="date"], select {
    border: 1px solid var(--base-border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    background: var(--base-bg-card);
    color: var(--ink);
  }
  select { width: 100%; }
  input[type="text"] { width: 100%; }

  .inline-row { display: flex; align-items: center; gap: 10px; }
  .inline-row input[type="number"] { width: 90px; }

  .submit-btn {
    width: 100%;
    background: var(--page-accent);
    color: #fffdf8;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }
  .submit-btn:disabled { opacity: 0.6; cursor: default; }
  .submit-btn.small { padding: 9px; font-size: 13px; }

  #log-status, #progress-status { font-size: 12.5px; margin-top: 8px; min-height: 16px; }
  #log-status.ok, #progress-status.ok { color: var(--accent-study-dark); }
  #log-status.err, #progress-status.err { color: #a32d2d; }

  .history-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    border: 1px solid var(--base-border); border-radius: 8px;
    padding: 9px 12px; margin-bottom: 7px; font-size: 12.5px;
  }
  .history-row .h-date { font-weight: 800; min-width: 50px; color: var(--page-accent-dark); }
  .history-row .h-tag { background: var(--page-accent-soft); color: var(--page-accent-dark); border-radius: 999px; padding: 2px 9px; font-size: 11px; }
  .history-row .h-content { color: var(--ink); flex: 1; min-width: 120px; }
  #history-list .loading { font-size: 13px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <a href="index.html" class="logo">Sara's Compass</a>
    <nav>
      <a href="index.html">トップ</a>
      <a href="study.html" class="active">勉強記録</a>
      <a href="health.html">健康記録</a>
      <a href="blog.html">ブログ</a>
      <a href="about.html">その他</a>
    </nav>
  </header>

  <div class="page-hero">
    <div class="eyebrow">STUDY LOG</div>
    <h1>勉強記録</h1>
    <p>税理士試験・近畿大学・産業能率大学。進捗と日々の学習ログをまとめて見える化。</p>
  </div>

  <div class="card">
    <h2>進捗ダッシュボード</h2>
    <div class="progress-grid" id="progress-grid">
      <div class="progress-card" data-target="財表受験">
        <div class="pc-title">財表受験</div>
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:0%"></div></div>
        <div class="pc-percent">0%</div>
        <div class="pc-memo">読み込み中…</div>
      </div>
      <div class="progress-card" data-target="近大残り単位">
        <div class="pc-title">近大残り単位</div>
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:0%"></div></div>
        <div class="pc-percent">0%</div>
        <div class="pc-memo">読み込み中…</div>
      </div>
      <div class="progress-card" data-target="産能大">
        <div class="pc-title">産能大</div>
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:0%"></div></div>
        <div class="pc-percent">0%</div>
        <div class="pc-memo">読み込み中…</div>
      </div>
    </div>

    <form id="progress-form" class="progress-edit-row">
      <select id="progress-target" required>
        <option value="財表受験">財表受験</option>
        <option value="近大残り単位">近大残り単位</option>
        <option value="産能大">産能大</option>
      </select>
      <input type="number" id="progress-percent" placeholder="進捗%" min="0" max="100" required>
      <input type="text" id="progress-memo" placeholder="メモ（任意）" style="flex:1.5;">
      <button type="submit" class="submit-btn small" style="width:auto; padding:9px 16px;">更新</button>
    </form>
    <div id="progress-status"></div>
  </div>

  <div class="card">
    <h2>今日の学習ログ</h2>
    <form id="log-form" class="form-grid">
      <div class="field-block">
        <label class="title">学習日</label>
        <input type="date" id="log-date" required>
      </div>
      <div class="field-block">
        <label class="title">カテゴリ</label>
        <select id="log-category">
          <option value="財表">財表（税理士試験）</option>
          <option value="近大">近大通信</option>
          <option value="産能大">産能大</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field-block">
        <label class="title">学習内容</label>
        <input type="text" id="log-content" placeholder="例：理論問題集 第3章、過去問演習など">
      </div>
      <div class="field-block">
        <label class="title">学習時間</label>
        <div class="inline-row">
          <input type="number" id="log-minutes" placeholder="分" min="0" max="600">
          <span style="font-size:13px; color:var(--ink-soft);">分</span>
        </div>
      </div>
      <button type="submit" class="submit-btn" id="log-submit-btn">記録する</button>
      <div id="log-status"></div>
    </form>
  </div>

  <div class="card">
    <h2>学習履歴</h2>
    <div id="history-list"><p class="loading">読み込み中…</p></div>
  </div>

  <footer class="site-footer">
    Sara's Compass — Project Compass
  </footer>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwaZx_bNjdmJnyV2wSdmSrdyR-SYGlVUEMKDazAEW4oGb7INTFfntMZIomzItU-MBJvTQ/exec';

  const $ = id => document.getElementById(id);

  function todayStr() {
    const d = new Date();
    const tz = d.getTimezoneOffset() * 60000;
    return new Date(d - tz).toISOString().slice(0, 10);
  }

  $('log-date').value = todayStr();

  function dateLabel(d) {
    if (!d) return '';
    const md = new Date(String(d).slice(0, 10) + 'T00:00:00');
    if (isNaN(md.getTime())) return String(d);
    return (md.getMonth() + 1) + '/' + md.getDate();
  }

  // ---- 進捗ダッシュボード ----
  async function loadProgress() {
    try {
      const res = await fetch(GAS_URL + '?type=progress');
      const rows = await res.json();
      document.querySelectorAll('.progress-card').forEach(card => {
        const target = card.dataset.target;
        const row = rows.find(r => r.target === target);
        const pct = row ? Number(row.progress_percent) : 0;
        card.querySelector('.progress-bar-fill').style.width = Math.max(0, Math.min(100, pct)) + '%';
        card.querySelector('.pc-percent').textContent = pct + '%';
        card.querySelector('.pc-memo').textContent = row && row.memo ? row.memo : 'まだ記録なし';
      });
    } catch (err) {
      document.querySelectorAll('.pc-memo').forEach(el => el.textContent = '取得できませんでした');
    }
  }

  $('progress-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const statusEl = $('progress-status');
    statusEl.textContent = '送信中…';
    statusEl.className = '';
    const params = new URLSearchParams({
      type: 'progress',
      target: $('progress-target').value,
      progress_percent: $('progress-percent').value,
      memo: $('progress-memo').value || ''
    });
    try {
      await fetch(GAS_URL, { method: 'POST', body: params });
      statusEl.textContent = '更新しました';
      statusEl.className = 'ok';
      $('progress-percent').value = '';
      $('progress-memo').value = '';
      loadProgress();
    } catch (err) {
      statusEl.textContent = '更新に失敗しました';
      statusEl.className = 'err';
    }
  });

  // ---- 学習ログ ----
  $('log-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = $('log-submit-btn');
    const statusEl = $('log-status');
    btn.disabled = true;
    statusEl.textContent = '送信中…';
    statusEl.className = '';

    const params = new URLSearchParams({
      type: 'log',
      date: $('log-date').value,
      category: $('log-category').value,
      content: $('log-content').value || '',
      minutes: $('log-minutes').value || ''
    });

    try {
      await fetch(GAS_URL, { method: 'POST', body: params });
      statusEl.textContent = '記録しました';
      statusEl.className = 'ok';
      $('log-content').value = '';
      $('log-minutes').value = '';
      loadHistory();
    } catch (err) {
      statusEl.textContent = '記録に失敗しました。もう一度試してね';
      statusEl.className = 'err';
    } finally {
      btn.disabled = false;
    }
  });

  async function loadHistory() {
    const listEl = $('history-list');
    listEl.innerHTML = '<p class="loading">読み込み中…</p>';
    try {
      const res = await fetch(GAS_URL + '?type=log');
      const rows = await res.json();
      if (!rows || rows.length === 0) {
        listEl.innerHTML = '<p class="loading">まだ記録がありません</p>';
        return;
      }
      const sorted = rows.slice().reverse().slice(0, 31);
      listEl.innerHTML = sorted.map(r => {
        const tags = [];
        if (r.category) tags.push(r.category);
        if (r.minutes) tags.push(r.minutes + '分');
        const tagHtml = tags.map(t => '<span class="h-tag">' + t + '</span>').join('');
        return '<div class="history-row"><span class="h-date">' + dateLabel(r.date) + '</span>' + tagHtml +
          (r.content ? '<span class="h-content">' + escapeHtml(String(r.content)) + '</span>' : '') + '</div>';
      }).join('');
    } catch (err) {
      listEl.innerHTML = '<p class="loading">履歴を取得できませんでした</p>';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  loadProgress();
  loadHistory();
</script>
</body>
</html>
